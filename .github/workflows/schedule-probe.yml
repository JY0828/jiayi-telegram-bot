name: Schedule probe

on:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Print schedule probe time
        run: |
          date -u
          echo "event=${{ github.event_name }}"
          echo "schedule=${{ github.event.schedule }}"
