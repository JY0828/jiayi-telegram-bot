name: Deutsch Telegram

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Content mode"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - daily
          - saturday
          - sunday
          - telegram_test
  schedule:
    # Avoid the top-of-hour Actions rush. The job gates on the Berlin 07:00-08:59 window below.
    - cron: "17,32,47 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: deutsch-telegram
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate Deutsch Telegram message and page
        id: generate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
          PUBLIC_PAGE_BASE: ${{ vars.PUBLIC_PAGE_BASE || 'https://jy0828.github.io/jiayi-telegram-bot' }}
        run: |
          MODE="${{ inputs.mode || 'auto' }}"
          TELEGRAM_TEST="false"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            BERLIN_HOUR="$(TZ=Europe/Berlin date +%H)"
            if [ "$BERLIN_HOUR" != "07" ] && [ "$BERLIN_HOUR" != "08" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            TODAY="$(TZ=Europe/Berlin date +%F)"
            if python -c 'import json, sys; from pathlib import Path; today = sys.argv[1]; path = Path("sent_history.json"); history = json.loads(path.read_text(encoding="utf-8")) if path.exists() else []; raise SystemExit(0 if any(entry.get("date") == today for entry in history) else 1)' "$TODAY"
            then
              echo "Already sent for $TODAY; skipping duplicate scheduled run."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          HISTORY="sent_history.json"
          GENERATE_MODE="$MODE"
          if [ "$MODE" = "telegram_test" ]; then
            TELEGRAM_TEST="true"
            HISTORY="telegram-test-history.json"
            GENERATE_MODE="daily"
          fi
          echo "telegram_test=$TELEGRAM_TEST" >> "$GITHUB_OUTPUT"
          python scripts/generate_deutsch_reactivation_page.py --mode "$GENERATE_MODE" --history "$HISTORY"

      - name: Commit generated page and history
        if: steps.generate.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/deutsch-pages
          if [ "${{ steps.generate.outputs.telegram_test }}" != "true" ]; then
            git add sent_history.json
          fi
          if [ -z "$(git status --porcelain -- outputs/deutsch-pages sent_history.json)" ]; then
            echo "No generated page or history changes."
            exit 0
          fi
          git commit -m "Add Deutsch learning page"
          git push

      - name: Configure GitHub Pages
        if: steps.generate.outputs.skip != 'true'
        uses: actions/configure-pages@v5

      - name: Upload Deutsch pages
        if: steps.generate.outputs.skip != 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: outputs

      - name: Deploy Deutsch pages
        if: steps.generate.outputs.skip != 'true'
        uses: actions/deploy-pages@v4

      - name: Send Telegram
        id: telegram
        if: steps.generate.outputs.skip != 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_MESSAGE_FILE: deutsch-reaktivierung-telegram.html
          TELEGRAM_ERROR_LOG: telegram-error.log
        run: python scripts/send_telegram.py
